{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}✦ REFLECTO ✦{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Pacifico&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:     #BD6C8C;
      --primary-dk:  #a05578;
      --primary-lt:  #d48faa;
      --beige:       #F2E2D8;
      --beige-dk:    #e8cfc2;
      --beige-lt:    #faf3ef;
      --surface:     rgba(242, 226, 216, 0.84);
      --surface2:    rgba(232, 207, 194, 0.92);
      --border:      rgba(189, 108, 140, 0.22);
      --border2:     rgba(189, 108, 140, 0.48);
      --text:        #4a2535;
      --text-muted:  #8a4f62;
      --text-dim:    #b8899a;
      --radius:      16px;
      --radius-sm:   10px;

      /* Font families */
      --font-ui:      'DM Sans', sans-serif;
      --font-entry:   'Lora', serif;
      --font-display: 'Playfair Display', serif;
      --font-brand:   'Pacifico', cursive;
      --font-auth:    'Quicksand', sans-serif;
    }

    html, body {
      min-height: 100vh;
      font-family: var(--font-ui);
      font-size: 15px;
      line-height: 1.6;
      color: var(--text);
    }

    body {
      background: url("{% static 'diary/bg.gif' %}") center center / cover fixed;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(242, 226, 216, 0.54);
      pointer-events: none;
      z-index: 0;
    }

    body > * { position: relative; z-index: 1; }

    /* ── Cards ───────────────────────────── */
    .card {
      background: var(--surface);
      border: 2px solid var(--border2);
      border-radius: var(--radius);
      padding: 2.2rem 2.4rem;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 8px 40px rgba(189,108,140,0.13), inset 0 1px 0 rgba(255,255,255,0.55);
    }

    .card-pixel { position: relative; }
    .card-pixel::before, .card-pixel::after {
      content: '✦';
      position: absolute;
      color: var(--primary);
      font-size: 10px;
      opacity: 0.55;
    }
    .card-pixel::before { top: 10px; left: 14px; }
    .card-pixel::after  { top: 10px; right: 14px; }

    /* ── Inputs ──────────────────────────── */
    input[type="text"], input[type="email"], input[type="password"],
    input[type="date"], textarea, select {
      width: 100%;
      background: rgba(250, 243, 239, 0.8);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      padding: 0.65rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(189,108,140,0.13);
    }
    input::placeholder, textarea::placeholder { color: var(--text-dim); }
    select option { background: #faf3ef; color: var(--text); }

    label {
      display: block;
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }
    .field { margin-bottom: 1.1rem; }

    /* ── Buttons ─────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.6rem 1.4rem;
      border-radius: 999px;
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-lt));
      color: #fff;
      box-shadow: 0 2px 16px rgba(189,108,140,0.32);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 24px rgba(189,108,140,0.45);
      color: #fff;
    }
    .btn-ghost {
      background: rgba(189,108,140,0.09);
      border: 1.5px solid var(--border2);
      color: var(--text-muted);
    }
    .btn-ghost:hover { background: rgba(189,108,140,0.17); color: var(--text); }
    .btn-danger {
      background: transparent;
      border: 1.5px solid rgba(189,80,100,0.45);
      color: #b85060;
      padding: 0.32rem 0.8rem;
      font-size: 12px;
    }
    .btn-danger:hover { background: rgba(189,80,100,0.1); }
    .btn-sm { padding: 0.3rem 0.8rem; font-size: 12px; }

    /* ── Alerts ──────────────────────────── */
    .alert {
      padding: 0.7rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 1rem;
      font-family: var(--font-ui);
    }
    .alert-success {
      background: rgba(100,180,130,0.12);
      border: 1px solid rgba(100,180,130,0.4);
      color: #3a7a55;
    }
    .alert-error {
      background: rgba(189,80,100,0.1);
      border: 1px solid rgba(189,80,100,0.35);
      color: #a03548;
    }

    /* ── Nav ─────────────────────────────── */
    .topnav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 54px;
      background: rgba(242, 226, 216, 0.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      z-index: 100;
    }
    .brand {
      font-family: var(--font-brand);
      font-size: 1.1rem;
      color: var(--primary);
      text-decoration: none;
      letter-spacing: 0.04em;
    }
    .nav-links { display: flex; align-items: center; gap: 0.2rem; }
    .nav-link {
      padding: 0.35rem 0.8rem;
      border-radius: 999px;
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      transition: all 0.2s;
    }
    .nav-link:hover { color: var(--text); background: rgba(189,108,140,0.1); }

    /* ── Page layout ─────────────────────── */
    .main-content {
      padding-top: 76px;
      padding-bottom: 3rem;
      max-width: 960px;
      margin: 0 auto;
      padding-left: 1.5rem;
      padding-right: 1.5rem;
    }
    .page-heading { margin-bottom: 1.8rem; }
    .page-heading h1 {
      font-family: var(--font-display);
      font-size: 2.4rem;
      color: var(--text);
      line-height: 1.15;
      font-weight: 600;
    }
    .page-heading .sub {
      font-family: var(--font-ui);
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 0.3rem;
    }

    /* ── Entry card ──────────────────────── */
    .entry-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      backdrop-filter: blur(14px);
      transition: border-color 0.2s, background 0.2s;
    }
    .entry-card:hover { border-color: var(--border2); background: var(--surface2); }
    .entry-title {
      font-family: var(--font-entry);
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.2rem;
    }
    .entry-meta {
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--text-dim);
      display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
    }
    .tag {
      display: inline-block;
      padding: 0.15rem 0.6rem;
      border-radius: 999px;
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: rgba(189,108,140,0.12);
      border: 1px solid rgba(189,108,140,0.3);
      color: var(--primary);
    }
    .entry-actions { display: flex; gap: 0.4rem; flex-shrink: 0; align-items: center; }

    /* ── Divider ─────────────────────────── */
    .divider { border: none; border-top: 1px solid var(--border); margin: 1.3rem 0; }

    /* ── Checkbox ────────────────────────── */
    .check-row { display: flex; align-items: center; gap: 0.55rem; cursor: pointer; }
    .check-row input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--primary); cursor: pointer; }
    .check-row span { font-family: var(--font-ui); font-size: 13px; color: var(--text-muted); }

    /* ── Modal ───────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(74,37,53,0.4);
      backdrop-filter: blur(6px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: rgba(250, 243, 239, 0.97);
      border: 1.5px solid var(--border2);
      border-radius: var(--radius);
      width: 100%; max-width: 520px;
      max-height: 85vh; overflow-y: auto;
      padding: 2rem; position: relative;
      box-shadow: 0 20px 60px rgba(189,108,140,0.22);
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 1.45rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text);
    }
    .modal-close {
      position: absolute; top: 1rem; right: 1rem;
      background: none; border: none; color: var(--text-muted);
      font-size: 1.1rem; cursor: pointer; padding: 0.2rem 0.5rem;
      border-radius: 6px; line-height: 1; font-family: var(--font-ui);
    }
    .modal-close:hover { color: var(--text); background: rgba(189,108,140,0.1); }

    /* Entry body text uses Lora (journal feel) */
    .entry-body {
      font-family: var(--font-entry);
      font-size: 15px;
      line-height: 1.85;
      color: var(--text-muted);
      white-space: pre-wrap;
    }

    /* ── Empty state ─────────────────────── */
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-dim); }
    .empty-state h3 {
      font-family: var(--font-display);
      font-size: 1.4rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    /* ── Scrollbar ───────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ── Animations ──────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.3); }
    }
    .fade-in   { animation: fadeUp 0.4s ease both; }
    .fade-in-2 { animation: fadeUp 0.4s 0.08s ease both; }
    .fade-in-3 { animation: fadeUp 0.4s 0.16s ease both; }

    @media (max-width: 600px) {
      .card { padding: 1.4rem; }
      .topnav { padding: 0 1rem; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
